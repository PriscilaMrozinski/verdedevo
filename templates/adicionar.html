<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Adicionar Planta</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 p-10">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow">

<h1 class="text-3xl font-bold text-green-800 mb-8">
Nova Planta 🌿
</h1>

<form method="POST" class="space-y-4">

<input
name="nome_popular"
placeholder="Nome popular"
class="w-full border p-3 rounded-xl">

<input
name="nome_cientifico"
placeholder="Nome científico"
class="w-full border p-3 rounded-xl">

<input
name="parte_utilizada"
placeholder="Parte utilizada"
class="w-full border p-3 rounded-xl">

<input
name="beneficios"
placeholder="Benefícios"
class="w-full border p-3 rounded-xl">

<input
name="indicacoes"
placeholder="Indicações"
class="w-full border p-3 rounded-xl">

<input
name="preparo"
placeholder="Preparo"
class="w-full border p-3 rounded-xl">

<button
class="bg-green-700 text-white px-6 py-3 rounded-xl">
Salvar Planta
</button>

</form>

</div>

</body>
</html>
